version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visit-kl-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "project=visit-kl"
      - "env=development"
